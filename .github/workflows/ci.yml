name: CI — Validate Dashboard

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Syntax & import check ─────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Supply_chain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on dashboard.py
        run: |
          flake8 dashboard.py \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --statistics

  # ── JOB 2: Install deps and run the data pipeline ────────────────────────
  validate:
    name: Validate Data Pipeline
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: Supply_chain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline and validate output
        run: |
          python - <<'PYEOF'
          import pandas as pd, sys, os
          from datetime import datetime

          # Read the input Excel file
          df = pd.read_excel("pharmacy_inventory.xlsx")
          df["expiry_date"]   = pd.to_datetime(df["expiry_date"])
          df["date_received"] = pd.to_datetime(df["date_received"])
          today = pd.Timestamp(datetime.today().date())
          df["days_to_expiry"] = (df["expiry_date"] - today).dt.days

          def flag_status(days):
              if days < 0:      return "Expired"
              elif days <= 30:  return "Critical"
              elif days <= 90:  return "Warning"
              else:             return "Safe"

          df["status"] = df["days_to_expiry"].apply(flag_status)
          df.to_csv("inventory_clean.csv", index=False)

          # Validate the output CSV
          out = pd.read_csv("inventory_clean.csv")

          required = [
              "drug_name", "category", "batch_number", "quantity",
              "unit_cost_ngn", "total_value_ngn", "date_received",
              "expiry_date", "supplier", "location",
              "days_to_expiry", "status"
          ]
          missing = [c for c in required if c not in out.columns]
          if missing:
              print(f"❌ Missing columns: {missing}"); sys.exit(1)

          bad = set(out["status"].unique()) - {"Expired","Critical","Warning","Safe"}
          if bad:
              print(f"❌ Unexpected status values: {bad}"); sys.exit(1)

          print(f"✅ Pipeline valid — {len(out)} rows")
          print(out["status"].value_counts().to_string())
          PYEOF
         

  # ── JOB 3: Smoke-test — Streamlit app starts and serves health endpoint ───
  smoke-test:
    name: Streamlit Smoke Test
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: Supply_chain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Streamlit and check health
        run: |
          streamlit run dashboard.py \
            --server.headless true \
            --server.port 8501 &
          APP_PID=$!

          for i in $(seq 1 15); do
            sleep 2
            if curl -sf http://localhost:8501/_stcore/health | grep -q "ok"; then
              echo "✅ App is healthy on port 8501"
              kill $APP_PID
              exit 0
            fi
            echo "Waiting... ($i/15)"
          done

          echo "❌ App did not start in time"
          kill $APP_PID 2>/dev/null || true
          exit 1
