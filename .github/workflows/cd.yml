name: CD — Verify Live Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  verify-live-app:
    name: Verify Streamlit App is Live
    runs-on: ubuntu-latest

    env:
      APP_URL: ${{ secrets.STREAMLIT_APP_URL }}

    steps:
      - name: Check APP_URL secret is set
        run: |
          if [ -z "$APP_URL" ]; then
            echo "❌ STREAMLIT_APP_URL secret is not set."
            exit 1
          fi
          echo "✅ APP_URL is configured"

      - name: Wait for Streamlit Cloud to redeploy
        run: |
          echo "Waiting 90 seconds for Streamlit Cloud to redeploy..."
          sleep 90

      - name: Check app health endpoint
        run: |
          HEALTH=$(curl -sf --max-time 30 "$APP_URL/_stcore/health" || echo "unreachable")
          echo "Health response: $HEALTH"
          if echo "$HEALTH" | grep -q "ok"; then
            echo "✅ App is live — health endpoint returned ok"
          else
            echo "❌ Health check failed: $HEALTH"
            exit 1
          fi

      - name: Report deployment status
        if: always()
        run: |
          echo "──────────────────────────────────────"
          echo "  Triggered  : ${{ github.event_name }}"
          echo "  Commit     : ${{ github.sha }}"
          echo "──────────────────────────────────────"