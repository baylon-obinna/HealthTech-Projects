name: CD — Verify Live Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  verify-live-app:
    name: Verify Streamlit App is Live
    runs-on: ubuntu-latest

    env:
      APP_URL: ${{ secrets.STREAMLIT_APP_URL }}

    steps:
      - name: Check APP_URL secret is set
        run: |
          if [ -z "$APP_URL" ]; then
            echo "❌ STREAMLIT_APP_URL secret is not set."
            exit 1
          fi
          echo "✅ APP_URL is configured"

      - name: Wait for Streamlit Cloud to redeploy
        run: |
          echo "Waiting 90 seconds for Streamlit Cloud to redeploy..."
          sleep 90

      - name: Check app is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "❌ App unreachable — no response"
            exit 1
          fi
          if [ "$STATUS" = "500" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "❌ App returned server error: $STATUS"
            exit 1
          fi
          echo "✅ App is reachable (HTTP $STATUS)"

      - name: Report deployment status
        if: always()
        run: |
          echo "──────────────────────────────────────"
          echo "  App        : $APP_URL"
          echo "  Triggered  : ${{ github.event_name }}"
          echo "  Commit     : ${{ github.sha }}"
          echo "──────────────────────────────────────"