name: CD — Verify Live Deployment

on:
  push:
    branches: [main]       # Triggers after every merge to main
  schedule:
    - cron: "0 6 * * *"   # Also runs daily at 6am UTC as a health monitor
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:

  verify-live-app:
    name: Verify Streamlit App is Live
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /Supply_chain

    env:
      APP_URL: ${{ secrets.STREAMLIT_APP_URL }}

    steps:
      - name: Check APP_URL secret is set
        run: |
          if [ -z "$APP_URL" ]; then
            echo "❌ STREAMLIT_APP_URL secret is not set."
            echo "Go to: Settings → Secrets → Actions → New repository secret"
            echo "Name: STREAMLIT_APP_URL"
            echo "Value: https://your-app.streamlit.app"
            exit 1
          fi
          echo "✅ APP_URL is configured: $APP_URL"

      - name: Wait for Streamlit Cloud to redeploy
        run: |
          echo "Giving Streamlit Cloud 60 seconds to pick up the latest commit..."
          sleep 60

      - name: Check app responds with HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ App returned HTTP $STATUS — deployment may have failed"
            exit 1
          fi
          echo "✅ App is live and returning HTTP 200"

      - name: Check app health endpoint
        run: |
          HEALTH=$(curl -sf "$APP_URL/_stcore/health" || echo "unreachable")
          echo "Health response: $HEALTH"
          if echo "$HEALTH" | grep -q "ok"; then
            echo "✅ Health endpoint confirmed OK"
          else
            echo "⚠️  Health endpoint did not return ok — app may still be booting"
            echo "   This is non-fatal on cold starts. Check the app manually."
          fi

      - name: Report deployment status
        if: always()
        run: |
          echo "──────────────────────────────────────"
          echo "  Deployment Verification Complete"
          echo "  App URL : $APP_URL"
          echo "  Triggered by : ${{ github.event_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "──────────────────────────────────────"